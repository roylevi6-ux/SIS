## SIS Calibration Config v1.0
## Per PRD Section 7.9 — separated from prompt logic.
## TLs tune thresholds here; prompts define WHAT to analyze.
## Changes logged in CalibrationLog with before/after values.
##
## Structure: nested by deal type to match _default_calibration_config()
## in sis/config.py. Keys: global, new_logo, expansion, alerts.

global:
  confidence_ceiling_sparse_data: 0.60
  sparse_data_threshold: 3          # transcripts below this = sparse flag
  stale_signal_days: 30

new_logo:
  agent_6_economic_buyer:
    eb_absence_health_ceiling: 80     # max health score if EB never appeared (stage-gated: S4+)
    secondhand_mention_counts_as_engaged: false

  synthesis_agent_10:
    health_score_weights:
      buyer_validated_pain_commercial_clarity: 14  # expanded: buyer-articulated pain + ROI + pricing
      momentum_quality: 13
      champion_strength: 12            # split from stakeholder_completeness — #1 predictor
      commitment_quality: 11
      economic_buyer_engagement: 11
      urgency_compelling_event: 10     # Agents 4, 7, 8, 9
      stage_appropriateness: 9
      multithreading_stakeholder_coverage: 7  # split from stakeholder_completeness
      competitive_position: 7
      technical_path_clarity: 6
    champion_absence_health_ceiling: 75
    forecast_commit_minimum_health: 75
    forecast_at_risk_maximum_health: 40

  never_rule_stage_gates:
    eb_absence_health_ceiling:
      ceiling: 80
      min_stage: 4                     # only fires at S4+
    champion_absence_health_ceiling:
      ceiling: 75
      min_stage: 3                     # only fires at S3+
    adversarial_challenge_required: false

expansion:
  agent_0e_account_health:
    relationship_health_weight_in_score: 15

  agent_6_economic_buyer:
    eb_absence_health_ceiling: 85     # expansion: EB less critical (existing relationship)
    secondhand_mention_counts_as_engaged: false

  synthesis_agent_10:
    health_score_weights:
      account_relationship_health: 13   # expansion-only dimension
      buyer_validated_pain_commercial_clarity: 12
      momentum_quality: 11
      champion_strength: 10
      commitment_quality: 9
      economic_buyer_engagement: 9
      urgency_compelling_event: 8
      stage_appropriateness: 8
      multithreading_stakeholder_coverage: 7
      competitive_position: 4
      technical_path_clarity: 9
    champion_absence_health_ceiling: 75
    forecast_commit_minimum_health: 65
    forecast_at_risk_maximum_health: 40

alerts:
  score_drop_threshold: 15          # Slack alert if score drops > this
  stale_call_days: 30               # alert if no call in this many days
  forecast_flip_alert: true         # alert on category change

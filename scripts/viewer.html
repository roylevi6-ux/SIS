<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIS Pipeline Output Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 240px; background: #1a1a2e; color: #ccc; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 10; }
.sidebar h2 { color: #fff; padding: 20px 16px 12px; font-size: 15px; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a4e; }
.sidebar a { display: block; padding: 10px 16px; color: #aab; text-decoration: none; font-size: 13px; border-left: 3px solid transparent; transition: all 0.15s; }
.sidebar a:hover, .sidebar a.active { background: #2a2a4e; color: #fff; border-left-color: #0066FF; }
.sidebar a .num { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; background: #2a2a4e; color: #8af; font-size: 11px; font-weight: 600; margin-right: 8px; }
.sidebar a:hover .num, .sidebar a.active .num { background: #0066FF; color: #fff; }
.sidebar .conf-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 6px; }

/* Main content */
.main { margin-left: 240px; flex: 1; padding: 0; }

/* Top banner */
.banner { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; padding: 24px 32px; display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
.banner .stat { text-align: center; }
.banner .stat .val { font-size: 28px; font-weight: 700; }
.banner .stat .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8af; margin-top: 2px; }

/* Section container */
.content { padding: 24px 32px; max-width: 1100px; }

/* Cards */
.card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
.card-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.card-header:hover { background: #f8f9fb; }
.card-body { padding: 0 20px 20px; display: block; }
.card-header .arrow { font-size: 12px; color: #999; transition: transform 0.2s; transform: rotate(90deg); }
.card.collapsed .card-header .arrow { transform: rotate(0deg); }
.card.collapsed .card-body { display: none; }
.agent-title { font-size: 16px; font-weight: 600; }
.agent-num { color: #0066FF; margin-right: 6px; }

/* Badges */
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-green { background: #e6f9e6; color: #1a7a1a; }
.badge-yellow { background: #fff8e1; color: #8a6d00; }
.badge-orange { background: #fff0e0; color: #c45000; }
.badge-red { background: #fde8e8; color: #c00; }
.badge-blue { background: #e8f0fe; color: #0066FF; }
.badge-gray { background: #eee; color: #666; }
.badge-purple { background: #f3e8ff; color: #7c3aed; }

/* Meta row */
.meta-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 8px 0 16px; }
.meta-item { font-size: 12px; color: #666; }
.meta-item b { color: #333; }

/* Narrative */
.narrative { background: #f8f9fb; border-left: 3px solid #0066FF; padding: 12px 16px; margin: 12px 0; font-size: 14px; line-height: 1.6; color: #333; border-radius: 0 6px 6px 0; }

/* Findings */
.findings-grid { display: grid; gap: 8px; margin: 12px 0; }
.finding-row { display: flex; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.finding-row:last-child { border-bottom: none; }
.finding-key { font-weight: 600; color: #555; min-width: 180px; flex-shrink: 0; }
.finding-val { color: #222; word-break: break-word; }

/* Evidence */
.evidence-block { margin: 12px 0; }
.evidence-item { background: #fafbfc; border-left: 3px solid #ddd; padding: 10px 14px; margin: 8px 0; border-radius: 0 6px 6px 0; }
.evidence-item .quote { font-style: italic; color: #444; font-size: 13px; line-height: 1.5; }
.evidence-item .speaker { font-size: 12px; color: #0066FF; font-weight: 600; margin-bottom: 4px; }
.evidence-item .interp { font-size: 12px; color: #666; margin-top: 6px; }
.evidence-item .claim-tag { font-size: 10px; color: #999; }

/* Lists */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { display: inline-block; padding: 3px 10px; background: #f0f2f5; border-radius: 4px; font-size: 12px; color: #444; }

/* Section headers */
.section-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 2px solid #0066FF; text-transform: uppercase; letter-spacing: 0.5px; }

/* Synthesis specific */
.health-score { display: flex; align-items: center; gap: 24px; margin: 16px 0; }
.health-num { font-size: 64px; font-weight: 800; line-height: 1; }
.health-bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
.health-bar-bg { flex: 1; max-width: 200px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.health-bar-fill { height: 100%; border-radius: 4px; }
.health-label { min-width: 180px; color: #555; }
.health-score-val { min-width: 50px; text-align: right; font-weight: 600; color: #333; }

.deal-memo { font-size: 15px; line-height: 1.7; color: #222; margin: 12px 0; }

.risk-card { padding: 12px 16px; margin: 6px 0; border-radius: 8px; border-left: 4px solid; }
.risk-critical { border-color: #dc2626; background: #fef2f2; }
.risk-high { border-color: #ea580c; background: #fff7ed; }
.risk-medium { border-color: #ca8a04; background: #fefce8; }
.risk-low { border-color: #16a34a; background: #f0fdf4; }
.risk-card .risk-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.risk-card .risk-detail { font-size: 12px; color: #555; }

.action-card { padding: 12px 16px; margin: 6px 0; border-radius: 8px; background: #f0f7ff; border-left: 4px solid #0066FF; }
.action-card .action-title { font-weight: 600; font-size: 14px; }
.action-card .action-meta { font-size: 12px; color: #555; margin-top: 4px; }

.contradiction { padding: 12px 16px; margin: 6px 0; border-radius: 8px; background: #f5f0ff; border-left: 4px solid #7c3aed; }
.contradiction .dim { font-weight: 700; font-size: 14px; color: #5b21b6; }
.contradiction .detail { font-size: 13px; margin: 4px 0; color: #444; }
.contradiction .resolution { font-size: 13px; color: #222; font-style: italic; }

/* Milestones */
.milestone-row { display: flex; align-items: flex-start; gap: 8px; margin: 6px 0; }
.milestone-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.milestone-text { font-size: 13px; }
.milestone-evidence { font-size: 11px; color: #888; margin-top: 2px; }

/* Stakeholder table */
.stake-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
.stake-table th { background: #f0f2f5; padding: 8px; text-align: left; font-weight: 600; }
.stake-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }

/* Print */
.print-btn { position: fixed; bottom: 20px; right: 20px; background: #0066FF; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; z-index: 20; box-shadow: 0 2px 8px rgba(0,102,255,0.3); }
.print-btn:hover { background: #0052cc; }
@media print { .sidebar, .print-btn { display: none !important; } .main { margin-left: 0 !important; } .card-body { display: block !important; } }

/* Momentum arrow */
.momentum-arrow { font-size: 24px; }
</style>
</head>

function confBadge(val) {
  if (val >= 0.8) return '<span class="badge badge-green">' + (val*100).toFixed(0) + '%</span>';
  if (val >= 0.6) return '<span class="badge badge-yellow">' + (val*100).toFixed(0) + '%</span>';
  if (val >= 0.4) return '<span class="badge badge-orange">' + (val*100).toFixed(0) + '%</span>';
  return '<span class="badge badge-red">' + (val*100).toFixed(0) + '%</span>';
}

function healthColor(score) {
  if (score >= 70) return '#16a34a';
  if (score >= 40) return '#ca8a04';
  return '#dc2626';
}

function severityClass(sev) {
  const s = (sev||'').toLowerCase();
  if (s.includes('critical')) return 'risk-critical';
  if (s.includes('high')) return 'risk-high';
  if (s.includes('medium') || s.includes('moderate')) return 'risk-medium';
  return 'risk-low';
}

function momentumArrow(dir) {
  const d = (dir||'').toLowerCase();
  if (d.includes('improv')) return '<span class="momentum-arrow" style="color:#16a34a">&#8599;</span>';
  if (d.includes('stable')) return '<span class="momentum-arrow" style="color:#ca8a04">&#8594;</span>';
  return '<span class="momentum-arrow" style="color:#dc2626">&#8600;</span>';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderVal(v, depth) {
  depth = depth || 0;
  if (v === null || v === undefined) return '<span style="color:#999">N/A</span>';
  if (typeof v === 'boolean') return v ? '<span style="color:#16a34a">&#10003; Yes</span>' : '<span style="color:#c00">&#10007; No</span>';
  if (typeof v === 'number') return esc(String(v));
  if (typeof v === 'string') return esc(v);
  if (Array.isArray(v)) {
    if (v.length === 0) return '<span style="color:#999">Empty</span>';
    if (typeof v[0] === 'string') return '<div class="tag-list">' + v.map(x => '<span class="tag">' + esc(x) + '</span>').join('') + '</div>';
    if (typeof v[0] === 'object') return v.map(obj => '<div style="margin:6px 0;padding:8px 12px;background:#f8f9fb;border-radius:6px;font-size:12px;">' + renderObj(obj, depth+1) + '</div>').join('');
    return esc(JSON.stringify(v));
  }
  if (typeof v === 'object') return renderObj(v, depth+1);
  return esc(String(v));
}

function renderObj(obj, depth) {
  depth = depth || 0;
  return Object.entries(obj).map(([k,v]) => {
    const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    return '<div class="finding-row"><div class="finding-key">' + esc(label) + '</div><div class="finding-val">' + renderVal(v, depth) + '</div></div>';
  }).join('');
}

function renderEvidence(evidence) {
  if (!evidence || evidence.length === 0) return '';
  return '<div class="section-title">Evidence Citations</div><div class="evidence-block">' +
    evidence.map(e =>
      '<div class="evidence-item">' +
      '<div class="speaker">' + esc(e.speaker || 'Unknown') + ' <span class="claim-tag">[Call ' + e.transcript_index + ', ' + esc(e.claim_id) + ']</span></div>' +
      '<div class="quote">"' + esc(e.quote) + '"</div>' +
      '<div class="interp">' + esc(e.interpretation) + '</div>' +
      '</div>'
    ).join('') + '</div>';
}

  const cost = (total_in * 3.0 / 1e6) + (total_out * 15.0 / 1e6);
  // Wall time estimate: step1 parallel + agent9 + agent10
  const a9 = DATA.agent_9 ? DATA.agent_9.elapsed_seconds : 0;

  // Narrative
  if (o.narrative) {
    html += '<div class="section-title">Narrative</div>';
    html += '<div class="narrative">' + esc(o.narrative) + '</div>';
  }

  // Findings
  if (o.findings) {
    html += '<div class="section-title">Findings</div>';

    // Special rendering for certain agents
    if (key === 'agent_1' && o.findings.milestones) {
      html += '<div class="findings-grid">';
      html += '<div class="finding-row"><div class="finding-key">Inferred Stage</div><div class="finding-val"><b>' + o.findings.inferred_stage + '</b> &mdash; ' + esc(o.findings.stage_name) + '</div></div>';
      if (o.findings.secondary_stage) {
        html += '<div class="finding-row"><div class="finding-key">Secondary Stage</div><div class="finding-val">' + o.findings.secondary_stage + ' &mdash; ' + esc(o.findings.secondary_stage_name || '') + '</div></div>';
      }
      html += '<div class="finding-row"><div class="finding-key">Reasoning</div><div class="finding-val">' + esc(o.findings.reasoning) + '</div></div>';
      html += '</div>';
      html += '<div class="section-title" style="font-size:12px;">Milestones</div>';
      o.findings.milestones.forEach(m => {
        html += '<div class="milestone-row"><span class="milestone-icon">' + (m.achieved ? '<span style="color:#16a34a">&#10003;</span>' : '<span style="color:#dc2626">&#10007;</span>') + '</span><div><div class="milestone-text">' + esc(m.milestone) + '</div><div class="milestone-evidence">' + esc(m.evidence) + '</div></div></div>';
      });
      if (o.findings.stage_risk_signals && o.findings.stage_risk_signals.length) {
        html += '<div class="section-title" style="font-size:12px;">Risk Signals</div>';
        html += '<div class="tag-list">' + o.findings.stage_risk_signals.map(s => '<span class="tag" style="background:#fde8e8;color:#c00;">' + esc(s) + '</span>').join('') + '</div>';
      }
    } else if (key === 'agent_2' && o.findings.stakeholders) {
      // Stakeholder table
      html += '<div class="section-title" style="font-size:12px;">Stakeholders</div>';
      html += '<table class="stake-table"><tr><th>Name</th><th>Role</th><th>Dept</th><th>Engagement</th><th>Calls</th></tr>';
      o.findings.stakeholders.forEach(s => {
        html += '<tr><td><b>' + esc(s.name) + '</b></td><td>' + esc(s.role) + '</td><td>' + esc(s.department) + '</td><td>' + esc(s.engagement_level) + '</td><td>' + s.calls_appeared + '</td></tr>';
      });
      html += '</table>';
      // Champion
      html += '<div class="finding-row"><div class="finding-key">Champion</div><div class="finding-val">' + (o.findings.champion.identified ? esc(o.findings.champion.name || 'Identified') : '<span style="color:#c00">No champion identified</span>') + '</div></div>';
      html += '<div class="finding-row"><div class="finding-key">Multithreading</div><div class="finding-val">' + esc(o.findings.multithreading_depth) + '</div></div>';
      html += '<div class="finding-row"><div class="finding-key">Decision Maker</div><div class="finding-val">' + esc(o.findings.decision_maker_engagement) + '</div></div>';
      if (o.findings.political_risk_flags && o.findings.political_risk_flags.length) {
        html += '<div class="section-title" style="font-size:12px;">Political Risk Flags</div>';
        html += '<div class="tag-list">' + o.findings.political_risk_flags.map(f => '<span class="tag" style="background:#fde8e8;color:#c00;">' + esc(f) + '</span>').join('') + '</div>';
      }
    } else if (key === 'agent_9' && o.findings.adversarial_challenges) {
      // Novel findings
      if (o.findings.novel_findings && o.findings.novel_findings.length) {
        html += '<div class="section-title" style="font-size:12px;">Novel Findings</div>';
        o.findings.novel_findings.forEach(f => {
          html += '<div style="margin:6px 0;padding:10px 14px;background:#f5f0ff;border-left:3px solid #7c3aed;border-radius:0 6px 6px 0;">';
          html += '<div style="font-weight:600;font-size:13px;"><span class="badge badge-purple">' + esc(f.category) + '</span> ' + esc(f.finding) + '</div>';
          html += '<div style="font-size:12px;color:#666;margin-top:4px;">' + esc(f.relevance) + '</div></div>';
        });
      }
      // Adversarial challenges
      html += '<div class="section-title" style="font-size:12px;">Adversarial Challenges</div>';
      o.findings.adversarial_challenges.forEach(c => {
        html += '<div class="risk-card ' + severityClass(c.severity) + '">';
        html += '<div class="risk-title"><span class="badge ' + (c.severity === 'Critical' ? 'badge-red' : 'badge-orange') + '">' + esc(c.severity) + '</span> vs ' + esc(c.target_agent_id) + '</div>';
        html += '<div style="font-size:13px;margin:4px 0;"><b>Claim:</b> ' + esc(c.claim_challenged) + '</div>';
        html += '<div style="font-size:13px;margin:4px 0;"><b>Counter:</b> ' + esc(c.counter_evidence) + '</div>';
        html += '<div style="font-size:13px;color:#0066FF;"><b>Revised:</b> ' + esc(c.revised_assessment) + '</div></div>';
      });
      // Gaps
      if (o.findings.upstream_gaps_identified && o.findings.upstream_gaps_identified.length) {
        html += '<div class="section-title" style="font-size:12px;">Upstream Gaps</div>';
        html += '<div class="tag-list">' + o.findings.upstream_gaps_identified.map(g => '<span class="tag">' + esc(g) + '</span>').join('') + '</div>';
      }
    } else {
      // Generic findings rendering
      html += '<div class="findings-grid">' + renderObj(o.findings) + '</div>';
    }
  }

  // Evidence
  html += renderEvidence(o.evidence);

  // Data gaps
  if (o.confidence && o.confidence.data_gaps && o.confidence.data_gaps.length) {
    html += '<div class="section-title">Data Gaps</div>';
    html += '<div class="tag-list">' + o.confidence.data_gaps.map(g => '<span class="tag">' + esc(g) + '</span>').join('') + '</div>';
  }

  html += '</div></div>';
  return html;
}

function toggle(card) { card.classList.toggle('collapsed'); }

// Render everything
buildBanner();
buildSidebar();

let contentHtml = buildSynthesis();
for (let i = 1; i <= 9; i++) {
  contentHtml += buildAgentCard('agent_' + i);
}
document.getElementById('content').innerHTML = contentHtml;
</script>
</body>
</html>
